let markers=[],lines=[]; const enc=s=>encodeURIComponent(s); const q=l=>l.query||l.name; const url=(kind,l)=>kind==='map'?`https://www.google.com/maps/search/?api=1&query=${enc(q(l))}`:kind==='google'?`https://www.google.com/search?q=${enc(q(l)+' reviews')}`:kind==='ta'?`https://www.tripadvisor.com/Search?q=${enc(q(l))}`:kind==='xhs'?`https://www.xiaohongshu.com/search_result?keyword=${enc(q(l))}&source=web_explore_feed`:`https://m.dianping.com/searchshop?keyword=${enc(q(l))}`;
function clearMap(){markers.forEach(m=>m.remove());lines.forEach(l=>l.remove());markers=[];lines=[];} function icon(c,e){return L.divIcon({className:'',html:`<div style="width:30px;height:30px;border-radius:50%;background:${c};border:3px solid white;box-shadow:0 2px 9px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-size:14px">${e||''}</div>`,iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-14]})}
function showMap(id){clearMap();const pts=[];if(id===0){DAYS.slice(1).forEach(d=>d.locations.forEach(l=>{pts.push([l.lat,l.lng]);markers.push(L.circleMarker([l.lat,l.lng],{radius:4,color:'#fff',weight:1.4,fillColor:d.color,fillOpacity:.88}).addTo(map).bindPopup(`<b>${l.name}</b><br>${d.label}`));}));}else{const d=DAYS.find(x=>x.id===id);d.locations.forEach(l=>{pts.push([l.lat,l.lng]);markers.push(L.marker([l.lat,l.lng],{icon:icon(d.color,emoji[l.type]||'•')}).addTo(map).bindPopup(`<b>${l.name}</b><br>${l.time}<br>${l.desc}`));}); if(pts.length>1)lines.push(L.polyline(pts,{color:d.color,weight:3,opacity:.55,dashArray:'6,5'}).addTo(map));} if(pts.length)map.fitBounds(pts,{padding:[36,36],maxZoom:13});}
function extLinks(l){return `<div class="links"><a class="btn primary" target="_blank" href="${url('map',l)}">导航</a><a class="btn" target="_blank" href="${url('google',l)}">Google评价</a><a class="btn" target="_blank" href="${url('ta',l)}">TripAdvisor</a><a class="btn" target="_blank" href="${url('xhs',l)}">小红书</a><a class="btn" target="_blank" href="${url('dp',l)}">大众点评</a>${l.reserve?`<a class="btn" target="_blank" href="${l.reserve}">查价/预约</a>`:''}</div>`;}
function card(l){const c=l.type==='food'?'#dc2626':l.type==='hotel'?'#f59e0b':l.type==='transport'?'#64748b':'#2563eb';return `<div class="item"><div class="time">${l.time}</div><div><div class="name"><span class="badge" style="background:${c}">${emoji[l.type]||'•'}</span>${l.name}</div><div class="desc">${l.desc}</div>${l.budget?`<div class="budget">${l.budget}</div>`:''}${l.detail?`<div class="detail">${l.detail}</div>`:''}${extLinks(l)}</div></div>`;}
function overview(){const rows=TRANSPORTS.map(t=>`<div class="price-row"><b>${t.date} · ${t.route}</b><span>${t.mode} · ${t.time}</span><span>${t.price}</span><a target="_blank" href="${t.link}">实时复查</a></div>`).join('');const dayCards=DAYS.slice(1).map(d=>`<div class="card" onclick="go(${d.id})"><h3>${d.label} · ${d.title}</h3><p>${d.date}</p></div>`).join('');const sourceLinks=Object.entries(SOURCES).map(([k,v])=>`<a class="btn" target="_blank" href="${v}">${k}</a>`).join('');return `<section class="hero"><h1>武汉出发 · 土耳其 + 埃及 2026</h1><div class="sub">7/15 从武汉出发，7/29 从埃及离境，7/30 前抵达上海或武汉。保留伊斯坦布尔、卡帕多奇亚、安塔利亚、费特希耶、开罗、赫尔格达。</div></section><div class="grid"><div class="card"><h3>路线</h3><p>武汉 → 伊斯坦布尔 → 卡帕多奇亚 → 安塔利亚 → 费特希耶 → 开罗 → 赫尔格达 → 上海/武汉</p></div><div class="card"><h3>取舍</h3><p>删掉棉花堡、以弗所、卢克索、阿斯旺、阿布辛贝、亚历山大，避免 15 天内过度转场。</p></div><div class="card"><h3>签证</h3><p>土耳其：中国普通护照免签 90/180；埃及用 e-Visa 官方入口提前核验。</p></div><div class="card"><h3>支付</h3><p>土耳其卡+现金；埃及务必准备小额现金和零钱。</p></div></div><div class="section">关键交通与当前价格</div><div class="price-table">${rows}</div><div class="section">每日行程</div><div class="grid">${dayCards}</div><div class="section">来源与复查入口</div><div class="links">${sourceLinks}</div><p class="note">价格为 2026-06-26 查询到的公开起价或合理参考区间。航班和长途车票价会随日期、库存、行李和支付货币变化，出票前必须点“实时复查”。</p>`;}
function renderDay(id){const d=DAYS.find(x=>x.id===id);return `<div class="day-head"><h2>${d.title}</h2><div class="date">${d.date}</div></div><div class="timeline">${d.locations.map(card).join('')}</div>`;}
const tabs=document.getElementById('tabs'),content=document.getElementById('content'); DAYS.forEach(d=>{const b=document.createElement('button');b.className='tab';b.textContent=d.label;b.onclick=()=>go(d.id);tabs.appendChild(b);});
function go(id){[...tabs.children].forEach((b,i)=>b.classList.toggle('active',DAYS[i].id===id));content.innerHTML=id===0?overview():renderDay(id);showMap(id);window.scrollTo({top:0,behavior:'smooth'});const btn=[...tabs.children].find((b,i)=>DAYS[i].id===id);if(btn)btn.scrollIntoView({inline:'center',block:'nearest'});} go(0);
</script>
</body>
