<!doctype html>

<head>

<meta name="description" content="从中国出发，经土耳其伊斯坦布尔和卡帕多奇亚，再到埃及开罗与卢克索的 14 天交互行程地图。">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#f5f6f8;--card:#fff;--text:#17202a;--muted:#697586;--line:#dde3ea;--accent:#0b72e7;--red:#ef4444;--blue:#0b72e7;--green:#16a34a;--orange:#f59e0b;--purple:#8b5cf6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5}#map{height:42vh;min-height:300px;position:sticky;top:0;z-index:5}.tabs{position:sticky;top:42vh;z-index:4;display:flex;gap:7px;overflow-x:auto;padding:10px 12px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.tabs::-webkit-scrollbar{display:none}.tab{border:0;border-radius:999px;padding:7px 13px;white-space:nowrap;background:#e9eef5;color:#4b5563;font-weight:700}.tab.active{background:var(--accent);color:#fff}.wrap{max-width:780px;margin:0 auto;padding:14px 13px 40px}.hero{padding:20px 4px 14px;text-align:center}.hero h1{font-size:27px;line-height:1.15;margin:0 0 7px}.hero p{margin:0;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.info,.day-card,.place{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:0 2px 10px rgba(15,23,42,.04)}.label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase}.value{font-weight:750;margin-top:4px}.section{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;margin:22px 2px 8px}.day-card{margin:8px 0;cursor:pointer}.day-card h3{font-size:16px;margin:0 0 4px}.day-card p{margin:0;color:var(--muted);font-size:14px}.day-head{padding:12px 2px}.day-head h2{font-size:24px;margin:0}.day-head p{color:var(--muted);margin:3px 0 0}.timeline{position:relative;padding-left:22px}.timeline:before{content:"";position:absolute;left:7px;top:12px;bottom:12px;width:2px;background:var(--line)}.item{position:relative;margin:9px 0}.dot{position:absolute;left:-20px;top:18px;width:11px;height:11px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--bg)}.dot.food{background:var(--red)}.dot.hotel{background:var(--orange)}.dot.transport{background:#94a3b8}.dot.drink{background:var(--purple)}.place .time{font-size:12px;color:var(--muted);font-weight:800}.place h3{font-size:17px;margin:2px 0 4px}.place p{margin:0;color:var(--muted);font-size:14px}.buttons{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.btn{display:inline-flex;align-items:center;text-decoration:none;border:0;border-radius:9px;padding:8px 11px;background:var(--accent);color:#fff;font-weight:800;font-size:13px}.btn.alt{background:#eef4ff;color:var(--accent)}.budget{display:inline-block;margin-top:7px;padding:3px 8px;border-radius:7px;background:#f1f5f9;color:#64748b;font-size:12px}.note{border-left:4px solid var(--orange)}.leaflet-popup-content{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,"PingFang SC",sans-serif}@media(max-width:560px){.grid{grid-template-columns:1fr}.hero h1{font-size:24px}.wrap{padding-left:11px;padding-right:11px}}
</style>
</head>

const COLORS=['#0b72e7','#16a34a','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#22c55e','#f97316','#eab308','#a855f7','#6366f1','#f43f5e','#14b8a6','#64748b'];
const DAYS=[
{id:1,label:'D1',date:'中国出发 → 伊斯坦布尔',title:'落地日，只做轻量适应',places:[['Istanbul Airport',41.2753,28.7519,'transport','下午/晚上','从中国主要城市飞伊斯坦布尔，落地后直接进城。','Istanbul Airport'],['Sultanahmet 住宿区',41.0086,28.9802,'hotel','晚上','建议第一段住老城，方便步行覆盖核心景点。','Sultanahmet Istanbul'],['Sultanahmet 晚餐区',41.008,28.9784,'food','20:00','酒店附近稳妥晚餐，早点休息。','Sultanahmet restaurants','TRY 600-1200/人']]},
{id:2,label:'D2',date:'伊斯坦布尔老城',title:'拜占庭与奥斯曼核心区',places:[['Hagia Sophia',41.0086,28.9802,'spot','09:00','先看圣索菲亚，避开中午人流。','Hagia Sophia Istanbul'],['Blue Mosque',41.0054,28.9768,'spot','10:30','与圣索菲亚相邻，适合步行串联。','Blue Mosque Istanbul'],['Basilica Cistern',41.0084,28.9779,'spot','11:45','室内点，适合作为天气或日晒缓冲。','Basilica Cistern Istanbul'],['Sultanahmet 午餐区',41.0067,28.9738,'food','13:00','老城午餐，不为了餐厅反向绕路。','Sultanahmet lunch','TRY 500-1000/人'],['Topkapi Palace',41.0115,28.9833,'spot','14:30','下午留给托普卡帕宫和后宫区。','Topkapi Palace Istanbul'],['Grand Bazaar',41.0107,28.968,'spot','17:30','收尾逛集市，买不买都可以。','Grand Bazaar Istanbul']]},
{id:3,label:'D3',date:'博斯普鲁斯海峡 + Galata',title:'水上视角和新城散步',places:[['Eminonu Pier',41.0165,28.9707,'transport','09:30','从码头坐博斯普鲁斯海峡船。','Eminonu Pier Istanbul'],['Bosphorus Cruise',41.043,29.004,'spot','10:00','把伊斯坦布尔欧亚两岸一次看清。','Bosphorus Cruise Istanbul'],['Karakoy 午餐区',41.0227,28.9744,'food','12:30','靠近码头和 Galata，餐厅密度高。','Karakoy restaurants','TRY 600-1300/人'],['Galata Tower',41.0256,28.9741,'spot','14:00','Galata 区域制高点，适合顺路看天际线。','Galata Tower Istanbul'],['Istiklal Avenue',41.0369,28.985,'spot','16:00','从 Galata 往 Taksim 方向散步。','Istiklal Avenue Istanbul'],['Galata 晚餐/酒吧区',41.025,28.9745,'drink','19:00','选 Galata 或 Karakoy 晚餐，方便回酒店。','Galata restaurants','TRY 800-1600/人']]},
{id:4,label:'D4',date:'亚洲岸 Kadikoy + Bosphorus',title:'放慢节奏的一天',places:[['Dolmabahce Palace',41.0392,29.0007,'spot','09:30','上午看新皇宫，和老城形成对照。','Dolmabahce Palace Istanbul'],['Ortakoy Mosque',41.0473,29.0266,'spot','12:00','海峡边拍照和午餐，天气好时体验很好。','Ortakoy Mosque Istanbul'],['Besiktas / Ortakoy 午餐区',41.0435,29.0065,'food','13:00','用午餐衔接欧岸到亚洲岸。','Ortakoy restaurants','TRY 500-1100/人'],['Kadikoy Market',40.9903,29.0274,'spot','15:30','坐船去亚洲岸，逛市场和街区。','Kadikoy Market Istanbul'],['Moda Seaside',40.9842,29.0258,'spot','17:30','傍晚在 Moda 海边散步。','Moda Istanbul'],['Ciya Sofrasi 周边晚餐',40.9908,29.0244,'food','19:00','Kadikoy 晚餐候选区，适合尝安纳托利亚菜。','Ciya Sofrasi Istanbul','TRY 700-1400/人']]},
{id:5,label:'D5',date:'伊斯坦布尔 → 卡帕多奇亚',title:'转场日，住进 Goreme',places:[['Istanbul Airport',41.2753,28.7519,'transport','上午','飞 Nevsehir 或 Kayseri。','Istanbul Airport'],['Nevsehir Kapadokya Airport',38.7719,34.5345,'transport','中午','距离 Goreme 较近，也可用 Kayseri 替换。','Nevsehir Kapadokya Airport'],['Goreme 住宿区',38.6431,34.8289,'hotel','15:00','建议住 Goreme，方便看热气球和参加一日游。','Goreme Cappadocia'],['Goreme Sunset Point',38.6436,34.8273,'spot','17:30','转场日只安排日落轻徒步。','Goreme Sunset Point'],['Goreme 晚餐区',38.643,34.829,'food','19:00','吃陶罐牛肉或当地土耳其菜。','Goreme restaurants','TRY 600-1300/人']]},
{id:6,label:'D6',date:'卡帕多奇亚',title:'热气球 + Goreme 经典线',places:[['Hot Air Balloon Pickup',38.6431,34.8289,'transport','04:30','热气球是天气敏感项目，尽量预留两天机会。','Goreme hot air balloon'],['Goreme Open Air Museum',38.64,34.845,'spot','10:30','卡帕多奇亚最稳的文化锚点。','Goreme Open Air Museum'],['Goreme 午餐区',38.643,34.829,'food','13:00','回镇上午餐和休息。','Goreme lunch','TRY 500-1000/人'],['Uchisar Castle',38.6308,34.805,'spot','16:00','下午看城堡和高处视角。','Uchisar Castle'],['Love Valley Viewpoint',38.6667,34.8205,'spot','17:30','日落候选点，不必全程徒步。','Love Valley Cappadocia']]},
{id:7,label:'D7',date:'卡帕多奇亚',title:'地下城 + 山谷缓冲日',places:[['Kaymakli Underground City',38.4626,34.7515,'spot','09:30','地下城适合上午参观，避开下午疲劳。','Kaymakli Underground City'],['Pigeon Valley',38.628,34.806,'spot','12:00','回 Goreme 路上顺路看峡谷。','Pigeon Valley Cappadocia'],['Goreme 午餐/午休',38.643,34.829,'food','13:00','中午回镇休整。','Goreme cafe','TRY 500-1000/人'],['Pasabag',38.6794,34.8531,'spot','15:30','看仙人烟囱地貌。','Pasabag Cappadocia'],['Devrent Valley',38.6837,34.8904,'spot','17:00','轻量收尾点，适合拍照。','Devrent Valley Cappadocia']]},
{id:8,label:'D8',date:'卡帕多奇亚 → 开罗',title:'跨国转场日',places:[['Nevsehir Kapadokya Airport',38.7719,34.5345,'transport','上午','飞伊斯坦布尔转机去开罗。','Nevsehir Kapadokya Airport'],['Cairo International Airport',30.112,31.4,'transport','下午/晚上','落地开罗，先处理入境和现金。','Cairo International Airport'],['Giza / Zamalek 住宿区',30.0618,31.2197,'hotel','晚上','想看金字塔日出选 Giza，想吃饭方便选 Zamalek。','Zamalek Cairo'],['Zamalek 轻晚餐',30.0618,31.2197,'food','20:00','转场日不进老城区，简单吃饭休息。','Zamalek restaurants Cairo','EGP 500-1200/人']]},
{id:9,label:'D9',date:'开罗 Giza',title:'金字塔 + 大埃及博物馆',places:[['Giza Pyramid Complex',29.9792,31.1342,'spot','08:00','清晨进金字塔区，避开高温和团队人流。','Giza Pyramid Complex'],['Great Sphinx of Giza',29.9753,31.1376,'spot','10:30','金字塔区内顺路看狮身人面像。','Great Sphinx of Giza'],['Giza 午餐区',29.987,31.142,'food','12:30','优先选金字塔附近景观餐厅或酒店餐厅。','Giza pyramid view restaurant','EGP 600-1500/人'],['Grand Egyptian Museum',29.9936,31.1194,'spot','14:30','下午留给大埃及博物馆，和金字塔同区最顺。','Grand Egyptian Museum'],['Giza 日落/晚餐区',29.987,31.142,'food','19:00','住 Giza 则晚餐不再回市中心。','Giza dinner','EGP 600-1500/人']]},
{id:10,label:'D10',date:'开罗市区',title:'伊斯兰开罗 + 博物馆备选',places:[['Citadel of Saladin',30.0299,31.2613,'spot','09:00','上午看城堡和穆罕默德阿里清真寺。','Cairo Citadel'],['Mosque of Muhammad Ali',30.0286,31.2599,'spot','10:30','城堡内重点点位。','Mosque of Muhammad Ali Cairo'],['Khan el-Khalili 午餐/咖啡区',30.0477,31.2628,'food','12:30','进老城前吃饭，下午逛市集。','Khan el Khalili restaurants','EGP 400-1000/人'],['Khan el-Khalili',30.0477,31.2628,'spot','14:00','老城集市和街区体验。','Khan el-Khalili Cairo'],['Nile Dinner Area',30.0444,31.2357,'food','19:00','晚餐选尼罗河边或 Zamalek，交通较可控。','Nile dinner Cairo','EGP 600-1500/人']]},
{id:11,label:'D11',date:'开罗 → 卢克索',title:'飞卢克索 + 东岸神庙',places:[['Cairo International Airport',30.112,31.4,'transport','上午','建议早班机飞卢克索。','Cairo International Airport'],['Luxor International Airport',25.671,32.7066,'transport','中午','抵达后住东岸，吃饭和夜间活动方便。','Luxor International Airport'],['Luxor East Bank 住宿区',25.6995,32.6391,'hotel','14:00','东岸住宿方便 Karnak、Luxor Temple 和餐厅。','Luxor Temple area hotels'],['Karnak Temple',25.7188,32.6573,'spot','15:30','下午看卡纳克神庙，尺度最大。','Karnak Temple'],['Luxor Temple',25.6995,32.6391,'spot','18:00','傍晚到夜景看卢克索神庙。','Luxor Temple'],['Luxor Corniche 晚餐',25.701,32.642,'food','20:00','住处附近晚餐，早点休息。','Luxor Corniche restaurants','EGP 400-1000/人']]},
{id:12,label:'D12',date:'卢克索西岸',title:'帝王谷主日',places:[['Valley of the Kings',25.7402,32.6014,'spot','07:30','清晨进帝王谷，避开高温。','Valley of the Kings'],['Temple of Hatshepsut',25.7385,32.6066,'spot','10:30','西岸第二个主点，和帝王谷距离近。','Temple of Hatshepsut'],['Colossi of Memnon',25.7206,32.6104,'spot','12:00','回程顺路停车点。','Colossi of Memnon'],['West Bank 午餐区',25.72,32.6,'food','13:00','西岸简单午餐后回酒店休息。','Luxor West Bank restaurants','EGP 300-800/人'],['Nile Felucca Sunset',25.7,32.638,'spot','17:00','傍晚可坐帆船或在河边看日落。','Luxor felucca']]},
{id:13,label:'D13',date:'卢克索 → 开罗',title:'回开罗缓冲，不再跑远',places:[['Luxor Temple Area',25.6995,32.6391,'spot','09:30','上午留给补拍、买纪念品或酒店休息。','Luxor Temple'],['Luxor International Airport',25.671,32.7066,'transport','下午','飞回开罗。','Luxor International Airport'],['Cairo Airport / Heliopolis 住宿区',30.101,31.378,'hotel','晚上','最后一晚住机场或 Heliopolis，方便 D14 回国。','Heliopolis Cairo hotels'],['Heliopolis 晚餐区',30.092,31.322,'food','19:30','最后一晚不进老城，避免堵车。','Heliopolis restaurants Cairo','EGP 500-1200/人']]},
{id:14,label:'D14',date:'开罗 → 中国',title:'返程日，机场优先',places:[['Cairo International Airport',30.112,31.4,'transport','按航班','返程回中国，国际航班建议提前 3 小时到机场。','Cairo International Airport'],['Citystars / Airport Mall Buffer',30.0734,31.346,'spot','备选','晚航班可作为轻量备选，不影响去机场。','Citystars Cairo']]}
];
const map=L.map('map',{zoomControl:false}).setView([38.5,32],4);L.control.zoom({position:'topright'}).addTo(map);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
let layers=[];const tabs=document.getElementById('tabs'),content=document.getElementById('content');function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function maps(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q)}function clear(){layers.forEach(x=>map.removeLayer(x));layers=[]}function marker(p,color){const icon=L.divIcon({className:'',html:`<div style="width:28px;height:28px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);display:grid;place-items:center;color:#fff;font-size:13px">${p[3]=='food'?'餐':p[3]=='hotel'?'住':p[3]=='transport'?'行':'景'}</div>`,iconSize:[28,28],iconAnchor:[14,14]});return L.marker([p[1],p[2]],{icon})}
function overview(){clear();let pts=[];DAYS.forEach((d,i)=>d.places.forEach(p=>{pts.push([p[1],p[2]]);let m=L.circleMarker([p[1],p[2]],{radius:4,color:'#fff',weight:1.5,fillColor:COLORS[i%COLORS.length],fillOpacity:.9}).bindPopup(`<b>${esc(p[0])}</b><br>${d.label}`);m.addTo(map);layers.push(m)}));map.fitBounds(pts,{padding:[28,28]});content.innerHTML=`<section class="hero"><h1>中国出发 · 土耳其 + 埃及 14 天</h1><p>伊斯坦布尔 4 天 · 卡帕多奇亚 3 天 · 开罗/卢克索 7 天。行程是参考坐标，旅途中可按天气、体力和交通调整。</p></section><section class="grid"><div class="info"><div class="label">路线</div><div class="value">中国 → 伊斯坦布尔 → 卡帕多奇亚 → 开罗 → 卢克索 → 开罗 → 中国</div></div><div class="info"><div class="label">住宿基准</div><div class="value">Sultanahmet / Goreme / Giza or Zamalek / Luxor East Bank</div></div><div class="info"><div class="label">签证</div><div class="value">土耳其按当前信息免签；埃及出发前核验 e-Visa/落地签资格</div></div><div class="info"><div class="label">预算</div><div class="value">不含国际机票，舒适型约 USD 1500-2300/人</div></div></section><section class="info note"><b>主动砍掉：</b>棉花堡、以弗所、安塔利亚、阿斯旺、阿布辛贝、亚历山大和红海。14 天双国路线里这些点会明显增加折返和转场风险。</section><div class="section">每天概览</div>${DAYS.map(d=>`<div class="day-card" onclick="go(${d.id})"><h3>${d.label} · ${esc(d.title)}</h3><p>${esc(d.date)}</p></div>`).join('')}`}
function renderDay(id){const d=DAYS.find(x=>x.id==id),color=COLORS[(id-1)%COLORS.length];clear();let coords=[];d.places.forEach(p=>{coords.push([p[1],p[2]]);let m=marker(p,color).bindPopup(`<b>${esc(p[0])}</b><br>${esc(p[4])}<br>${esc(p[5])}<br><a href="${maps(p[6]||p[0])}" target="_blank">导航</a>`);m.addTo(map);layers.push(m)});if(coords.length>1){let line=L.polyline(coords,{color,weight:3,opacity:.55,dashArray:'6,5'}).addTo(map);layers.push(line)}map.fitBounds(coords,{padding:[36,36],maxZoom:13});content.innerHTML=`<div class="day-head"><h2>${d.label} · ${esc(d.title)}</h2><p>${esc(d.date)}</p></div><div class="timeline">${d.places.map(p=>`<div class="item"><div class="dot ${p[3]}"></div><div class="place"><div class="time">${esc(p[4])}</div><h3>${esc(p[0])}</h3><p>${esc(p[5])}</p>${p[7]?`<span class="budget">${esc(p[7])}</span>`:''}<div class="buttons"><a class="btn" target="_blank" href="${maps(p[6]||p[0])}">Google Maps</a><a class="btn alt" target="_blank" href="https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(p[0])}">小红书搜索</a></div></div></div>`).join('')}</div>`}
function go(id){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',Number(t.dataset.id)==id));if(id===0)overview();else renderDay(id);window.scrollTo({top:0,behavior:'smooth'})}tabs.innerHTML=`<button class="tab active" data-id="0" onclick="go(0)">总览</button>`+DAYS.map(d=>`<button class="tab" data-id="${d.id}" onclick="go(${d.id})">${d.label}</button>`).join('');overview();
</script>
</body>
</html>
